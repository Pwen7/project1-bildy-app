services:
  app:
    build: .
    container_name: bildyapp
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DB_URI: mongodb://mongo:27017/bildyapp
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: bildyapp-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
